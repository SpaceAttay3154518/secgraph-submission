version: '3.8'

services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/secgraph123
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p secgraph123 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    volumes:
      - neo4j_data:/data

  recon-service:
    build: ./recon-service
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/recon/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      neo4j:
        condition: service_healthy
      recon-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: demo
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: secgraph123
      RECON_SERVICE_URL: http://recon-service:5000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  neo4j_data:
