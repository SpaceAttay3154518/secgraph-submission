spring:
  application:
    name: secgraph-backend

  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:secgraph123}

recon:
  service:
    url: ${RECON_SERVICE_URL:http://localhost:5000}

nvd:
  api:
    url: https://services.nvd.nist.gov/rest/json/cves/2.0
    key: ${NVD_API_KEY:}

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
